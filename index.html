<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>MINE ERP SYSTEM</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="assets/sandmine.png">
</head>
<body>

    <div id="sidebar" class="no-print" style="display: none;">
        <div class="logo-wrap">
            <img src="assets/sandmine.png" alt="Logo" style="height: 45px; width: auto; margin-bottom: 5px; object-fit: contain;">
            <div class="logo-text" id="main-logo-text">MINE ERP SYSTEM</div>
            <div id="cloud-status" style="font-size: 11px; color: #27ae60; margin-top: 5px; font-weight: bold; letter-spacing: 0.5px;">☁️ CONNECTING...</div>
        </div>
        
        <div class="ghat-selector-wrap" style="padding: 15px 20px; background: #13263d; border-bottom: 2px solid var(--accent);">
            <label style="color:#bdc3c7; font-size:10px; margin-bottom:3px; display:block; font-weight:bold;">SELECT GHAT / SITE</label>
            <select id="global-ghat-selector" onchange="App.changeGhatFilter()" style="background:#1a252f; color:white; border:1px solid #34495e; width:100%; padding:8px; font-weight:bold; border-radius:4px;"></select>
        </div>

        <div class="menu-head">Mining Register</div>
        <button class="menu-btn" onclick="App.showPage('mining-dash', this)" style="color:#3498db;">📊 MINING DASHBOARD</button>
        <button class="menu-btn" onclick="toggleMenu('mining-submenu')">⛏️ MINING RECORDS ▾</button>
        <div id="mining-submenu" style="display:none; padding-left:10px; background: #13263d;">
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('mining', this)">📝 Daily Sheet</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('expenses', this)">💸 Expense Panel</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('diesel', this)">⛽ Diesel Entries</button>
            <button class="menu-btn sub-menu-btn admin-only" onclick="App.showPage('ghats', this)">⚙️ Diesel Settings</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('mining-machines', this)">🚜 Machine Panel</button>
        </div>

        <div class="menu-head">Production Control</div>
        <button class="menu-btn" onclick="App.showPage('production-dash', this)" style="color:#16a085;">📊 PRODUCTION DASHBOARD</button>
        
        <button class="menu-btn" onclick="toggleMenu('production-submenu')">🏗️ SAND PRODUCTION ▾</button>
        <div id="production-submenu" style="display:none; padding-left:10px; background: #13263d;">
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('production-daily', this)" style="color:#f1c40f;">📝 Daily Cash Sheet</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock-production', this)">📝 Sand Production</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock-vehicles', this)">🚚 Vehicle Panel</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('production-machines', this)">🚜 Production Machines</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('production-diesel', this)">⛽ Diesel Entries</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('production-expenses', this)">💸 Other Expenses</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('production-manual', this)">➕ Manual Adjustments</button>
        </div>

        <div class="menu-head">Inventory & Stock</div>
        <button class="menu-btn" onclick="App.showPage('stock-dash', this)" style="color:#9b59b6;">📊 STOCK DASHBOARD</button>
        <button class="menu-btn" onclick="toggleMenu('stock-submenu')">📦 STOCK SECTION ▾</button>
        <div id="stock-submenu" style="display:none; padding-left:10px; background: #13263d;">
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock', this)">📝 Daily Sheet</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock-expenses', this)">💸 Expense Panel</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('diesel', this)">⛽ Diesel Entries</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock-machines', this)">🚜 Stock Machine</button>
            <button class="menu-btn sub-menu-btn" onclick="App.showPage('stock-manual', this)">➕ Manual Adjustments</button> 
        </div>

        <div class="menu-head admin-only">System Configuration</div>
        <button class="menu-btn admin-only" onclick="App.showPage('master-settings', this)" style="color: #f1c40f;">⚙️ MASTER SETTINGS</button>
        
        <div style="padding: 20px 20px 0 20px; margin-top: auto;" class="no-print" id="logout-section">
            <button class="menu-btn" onclick="App.logout()" style="background: #e74c3c; color: white !important; font-weight: bold; border-radius: 6px; text-align: center; border: none; width: 100%; padding: 10px;">🔒 LOGOUT SYSTEM</button>
        </div>

        <div class="no-print" style="text-align: center; padding: 15px 20px 20px 20px; margin-top: 10px;">
            <div style="font-size: 10px; color: #7f8c8d; letter-spacing: 0.5px; text-transform: uppercase;">Crafted & Developed By</div>
            <div style="font-size: 14px; color: #2ecc71; font-weight: 900; margin-top: 3px; letter-spacing: 1px;">ARUP MALIK</div>
        </div>
    </div>

    <div id="main">
        <div id="page-content" class="container"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="main_js/app.js"></script>
    <script src="main_js/dashboard.js"></script>
    <script src="main_js/ghat.js"></script>
    <script src="main_js/master_settings.js"></script>

    <script src="mining/mining_dashboard.js"></script>
    <script src="mining/mining.js"></script>
    <script src="mining/diesel.js"></script>
    <script src="mining/expenses.js"></script>
    <script src="mining/mining_machines.js"></script>

    <script src="stock/stock_dashboard.js"></script>
    <script src="stock/stock_daily.js"></script>
    <script src="stock/stock_expenses.js"></script>
    <script src="stock/stock_machines.js"></script>
    <script src="stock/stock_manual.js"></script>
    <script src="stock/stock_vehicles.js"></script> 
    
    <script src="stock_productions/production_dashboard.js"></script>
    <script src="stock_productions/production_daily.js"></script>
    <script src="stock_productions/stock_production.js"></script>
    <script src="stock_productions/production_machines.js"></script>
    <script src="stock_productions/production_diesel.js"></script>
    <script src="stock_productions/production_expenses.js"></script>
    <script src="stock_productions/production_manual.js"></script>
    
    <script>
        // 🔹 পরিবর্তন ২: window.onload এর বদলে DOMContentLoaded ব্যবহার করা হলো যাতে স্ক্রিপ্ট মুহূর্তের মধ্যে রান করে
        document.addEventListener('DOMContentLoaded', () => {
            if(typeof App !== 'undefined') {
                App.init();
            } else {
                console.error("App object not found!");
            }
        });

        function toggleMenu(menuId) {
            const mm = document.getElementById(menuId);
            if(mm) mm.style.display = (mm.style.display === 'none' || mm.style.display === '') ? 'block' : 'none';
        }
    </script>
</body>
</html>
